<!DOCTYPE html>
<html lang="es">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1.0">
      <meta name="description" content="Revisá tu carrito de compras en Imagine Accesorios y finalizá tu pedido de piezas artesanales únicas.">
      <link rel="preconnect" href="https://googleapis.com">
      <link rel="preconnect" href="https://gstatic.com" crossorigin>
      <link href="https://googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="web.css">
      <title>Tu compra</title>
   </head>
    
   <body>
      <header>
         <!-- ENCABEZADO -->
         <div class="contenedor-titulo">
            <p class="subtitulo">Accesorios</p>
            <h1 class="titulo-principal">Imagine.</h1>
            <img src="fotos/Imagine.png" alt="Imagine Accesorios" class="logo">
         </div>
         <!--BOTONES DE NAVEGACIÓN-->
         <nav>
            <div class="grupo-nav">
               <div class="btn-menu">
                  <button class="icon-menu" id="icon-menu" aria-label="Abrir menú">
                     <span></span>
                     <span></span>
                     <span></span>
                  </button>
               </div>
               <div class="menu-links" id="menu-links">
                  <a href="index.html" class="boton-nav">Inicio</a>
                  <a href="catalogo.html" class="boton-nav">Catálogo</a>
               </div>
               <div class="boton-nav" id="boton-nav-carrito">
                  <a href="carrito.html" class="boton-carrito">
                     <span class="texto-carrito">Carrito</span>
                     <svg viewBox="0 0 24 24" class="diseno-carrito">
                     <circle cx="9" cy="21" r="1"></circle>
                     <circle cx="20" cy="21" r="1"></circle>
                     <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                     </svg>
                     <span class="contador-carrito" id="contador-carrito">0</span>
                  </a>
               </div>
            </div>
         </nav>
      </header>
      <main>
         <!-- Dentro del body de carrito.html -->
         <section class="contenedor-carrito">
            <h2>Tu Carrito</h2>
            <div id="lista-carrito">
            <!-- Aquí aparecerán los productos mediante JS -->
            </div>
            <div id="total-carrito">
            <!-- Aquí el total -->
            </div>
            <div class="acciones-carrito">
               <!--botones de accion-->
            </div>
         </section>
         <div id="confirmacion-compra" class="mensaje-oculto sec-descripcion">
            <h2>¡Pedido Recibido!</h2>
            <p>¡Gracias por tu compra!.</p>
            <div id="detalle-recibo"></div>
            <p>Hacé clic abajo para enviarnos el detalle por WhatsApp y coordinar el pago/entrega:</p>
            <a id="btn-enviar-pedido-wa" href="https://wa.link/v381qe" target="_blank" class="boton-nav btn-finalizar">
               Enviar pedido por WhatsApp
            </a>
         </div>
      </main>
      <br>
      <footer class="car-footer">
         <p>&copy; 2026 - Lionela Ledesma</p>
      </footer>
      <script src="web.js"></script>
   </body>
</html>
